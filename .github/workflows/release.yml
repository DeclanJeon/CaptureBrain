name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release AAB (unsigned)
        run: ./gradlew bundleRelease
        env:
          # Release signing env vars — set in GitHub Secrets when ready
          CAPTUREBRAIN_UPLOAD_STORE_FILE: ${{ secrets.CAPTUREBRAIN_UPLOAD_STORE_FILE }}
          CAPTUREBRAIN_UPLOAD_STORE_PASSWORD: ${{ secrets.CAPTUREBRAIN_UPLOAD_STORE_PASSWORD }}
          CAPTUREBRAIN_UPLOAD_KEY_ALIAS: ${{ secrets.CAPTUREBRAIN_UPLOAD_KEY_ALIAS }}
          CAPTUREBRAIN_UPLOAD_KEY_PASSWORD: ${{ secrets.CAPTUREBRAIN_UPLOAD_KEY_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: 캡처브레인 v${{ steps.version.outputs.VERSION }}
          body: |
            ## 캡처브레인 v${{ steps.version.outputs.VERSION }}

            ### 변경사항
            - 커밋 내역은 아래에서 확인하세요

            ### 설치
            - `app-release.aab` 파일을 Google Play Console에 업로드하세요
            - 서명된 AAB를 원하면 GitHub Secrets에 키스토어 환경변수를 설정하세요
          files: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
