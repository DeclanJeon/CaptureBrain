name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lintDebug

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # Auto-bump patch version on push to main (not PR)
      - name: Bump patch version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Read current version
          VERSION_FILE="version.properties"
          if [ ! -f "$VERSION_FILE" ]; then
            echo "VERSION_CODE=1" > "$VERSION_FILE"
            echo "VERSION_NAME=0.1.0" >> "$VERSION_FILE"
          fi

          source "$VERSION_FILE"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          NEW_PATCH=$((PATCH + 1))
          NEW_CODE=$((VERSION_CODE + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

          echo "VERSION_CODE=$NEW_CODE" > "$VERSION_FILE"
          echo "VERSION_NAME=$NEW_VERSION" >> "$VERSION_FILE"

          # Update build.gradle.kts
          sed -i "s/versionCode = .*/versionCode = $NEW_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \".*\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts

          echo "🏷️  Version bumped: $VERSION_NAME → $NEW_VERSION (code $NEW_CODE)"

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties app/build.gradle.kts
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]" || true
          git tag "v$NEW_VERSION"
          git push --follow-tags

