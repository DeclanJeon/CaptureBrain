name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      bumped: ${{ steps.bump.outputs.bumped }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lintDebug

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # Auto-bump patch version on push to main (not PR)
      - name: Bump patch version
        id: bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          VERSION_FILE="version.properties"
          source "$VERSION_FILE"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          NEW_PATCH=$((PATCH + 1))
          NEW_CODE=$((VERSION_CODE + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

          echo "VERSION_CODE=$NEW_CODE" > "$VERSION_FILE"
          echo "VERSION_NAME=$NEW_VERSION" >> "$VERSION_FILE"

          sed -i "s/versionCode = .*/versionCode = $NEW_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \".*\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bumped=true" >> "$GITHUB_OUTPUT"
          echo "🏷️  Version bumped: $VERSION_NAME → $NEW_VERSION (code $NEW_CODE)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties app/build.gradle.kts
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]" || true
          git push
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

  release:
    needs: build
    if: needs.build.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.new_version }}
          name: 캡처브레인 v${{ needs.build.outputs.new_version }}
          body: |
            ## 캡처브레인 v${{ needs.build.outputs.new_version }}

            자동 릴리즈 — [skip ci] 커밋 제외 변경사항은 커밋 내역에서 확인하세요
          draft: false
          prerelease: false
