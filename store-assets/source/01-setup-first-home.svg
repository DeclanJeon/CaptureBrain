        <text x="155" y="1383" font-family="Noto-Sans-CJK-KR, Noto Sans CJK KR, Noto Sans, Arial" font-size="35" font-weight="800" fill="#111827">자동 폴더</text>
        <text x="100" y="1450" font-family="Noto-Sans-CJK-KR, Noto Sans CJK KR, Noto Sans, Arial" font-size="28" fill="#6B7280">내용을 보고 카테고리 폴더를 만듭니다.</text>
