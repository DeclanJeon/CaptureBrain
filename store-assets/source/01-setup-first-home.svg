    <text x="60" y="130" font-family="Noto-Sans-CJK-KR, Noto Sans CJK KR, Noto Sans, Arial" font-size="24" fill="#6B7280">복잡한 설정 없이 자동 정리</text>
    <text x="60" y="220" font-family="Noto-Sans-CJK-KR, Noto Sans CJK KR, Noto Sans, Arial" font-size="74" font-weight="900" fill="#111827">이제 스크린샷만</text><text x="60" y="306" font-family="Noto-Sans-CJK-KR, Noto Sans CJK KR, Noto Sans, Arial" font-size="74" font-weight="900" fill="#111827">찍으면 됩니다</text>
    <text x="64" y="420" font-family="Noto-Sans-CJK-KR, Noto Sans CJK KR, Noto Sans, Arial" font-size="32" fill="#6B7280">내용 감지 → 자동 폴더 → Drive 저장</text>
    <rect x="60" y="560" width="960" height="210" rx="34" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
        <circle cx="112" cy="616" r="19" fill="#10B981"/>
        <text x="155" y="618" font-family="Noto-Sans-CJK-KR, Noto Sans CJK KR, Noto Sans, Arial" font-size="35" font-weight="800" fill="#111827">Google Drive 연결</text>
        <text x="100" y="685" font-family="Noto-Sans-CJK-KR, Noto Sans CJK KR, Noto Sans, Arial" font-size="28" fill="#6B7280">내 Drive에 스크린샷과 Markdown을 저장합니다.</text>
        <rect x="824" y="592" width="150" height="48" rx="24" fill="#EFF6FF" stroke="#BFDBFE"/>
