        <text x="155" y="1128" font-family="Noto-Sans-CJK-KR, Noto Sans CJK KR, Noto Sans, Arial" font-size="35" font-weight="800" fill="#111827">스크린샷 접근</text>
        <text x="100" y="1195" font-family="Noto-Sans-CJK-KR, Noto Sans CJK KR, Noto Sans, Arial" font-size="28" fill="#6B7280">캡처 이미지를 감지해 자동으로 처리합니다.</text>
