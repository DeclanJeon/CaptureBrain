        <text x="155" y="873" font-family="Noto-Sans-CJK-KR, Noto Sans CJK KR, Noto Sans, Arial" font-size="35" font-weight="800" fill="#111827">저장 폴더 명칭</text>
        <text x="100" y="940" font-family="Noto-Sans-CJK-KR, Noto Sans CJK KR, Noto Sans, Arial" font-size="28" fill="#6B7280">기본값 CaptureBrain. 원하는 이름으로 바꿀 수 있습니다.</text>
        <rect x="824" y="847" width="150" height="48" rx="24" fill="#EFF6FF" stroke="#BFDBFE"/>
